services:
  was-blue:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: sportsify-was-blue
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-northeast-2
        awslogs-group: /sportsify/backend
        awslogs-stream: blue
        awslogs-create-group: "true"
    networks:
      - sportsify-net

  was-green:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: sportsify-was-green
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-northeast-2
        awslogs-group: /sportsify/backend
        awslogs-stream: green
        awslogs-create-group: "true"
    networks:
      - sportsify-net

  nginx:
    image: nginx:alpine
    container_name: sportsify-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/active-upstream.conf:/etc/nginx/active-upstream.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-northeast-2
        awslogs-group: /sportsify/nginx
        awslogs-stream: access-error
        awslogs-create-group: "true"
    networks:
      - sportsify-net

networks:
  sportsify-net:
    external: true
