name: CI/CD

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ develop ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !github.event.pull_request)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build jar
        run: ./gradlew bootJar -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Parameter Store에서 .env.prod 생성
            aws ssm get-parameters-by-path \
              --path "/sportsify/backend/" \
              --with-decryption \
              --region ${{ secrets.AWS_REGION }} \
              --query "Parameters[*].[Name,Value]" \
              --output text | \
              awk '{split($1,a,"/"); print a[4] "=" $2}' > ~/.env

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            export IMAGE_NAME=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}
            export IMAGE_TAG=${{ github.sha }}

            docker pull $IMAGE_NAME:$IMAGE_TAG

            # nginx.conf의 sportsify-active upstream에서 현재 라우팅 대상 확인
            ACTIVE_SERVER=$(awk '/upstream sportsify-active/,/}/' ~/nginx/nginx.conf | grep server | awk '{print $2}')
            if echo "$ACTIVE_SERVER" | grep -q "was-blue"; then
              ACTIVE=blue
              NEXT=green
            else
              ACTIVE=green
              NEXT=blue
            fi

            # next 컨테이너 교체 기동
            IMAGE_NAME=$IMAGE_NAME IMAGE_TAG=$IMAGE_TAG \
              docker compose -f ~/docker-compose.prod.yml up -d --no-deps was-$NEXT

            # 헬스체크 대기 (최대 60초)
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' sportsify-was-$NEXT 2>/dev/null)
              if [ "$STATUS" = "healthy" ]; then
                break
              fi
              sleep 5
            done

            if [ "$STATUS" != "healthy" ]; then
              echo "Health check failed. Rolling back."
              docker compose -f ~/docker-compose.prod.yml stop was-$NEXT
              exit 1
            fi

            # nginx upstream 전환
            sed -i "s|was-$ACTIVE:8080|was-$NEXT:8080|" ~/nginx/nginx.conf
            docker exec sportsify-nginx nginx -s reload

            # 이전 컨테이너 중단
            docker compose -f ~/docker-compose.prod.yml stop was-$ACTIVE
