name: Notify Slack on PR Events

on:
  pull_request:
    types: [review_requested, ready_for_review, closed, reopened]
    branches:
      - '**'

jobs:
  notify-slack:
    runs-on: ubuntu-latest

    # 동일한 PR에 대해 동시 실행 방지 (최신 것만 실행)
    concurrency:
      group: slack-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Wait for other events
        run: |
          # 다른 이벤트들이 함께 발생할 수 있으니 잠시 대기
          sleep 5

      - name: Send Slack Notification with Mentions
        run: |
          # PR 정보 가져오기
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_ACTION="${{ github.event.action }}"
          PR_IS_DRAFT=${{ github.event.pull_request.draft }}
          
          # Draft PR일 경우 알림 스킵
          if [ "$PR_ACTION" == "ready_for_review" ] && [ "$PR_IS_DRAFT" == "true" ]; then
            echo "Draft PR입니다. Slack 알림을 생략합니다."
            exit 0
          fi
          
          # PR 작성자 정보
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          
          # GitHub Secrets에서 매핑 정보 가져오기
          MAPPING_JSON='${{ secrets.SLACK_USER_MAPPING }}'
          
          # jq를 사용하여 JSON 파싱하는 함수
          get_slack_id() {
            local github_username=$1
            echo "$MAPPING_JSON" | jq -r --arg user "$github_username" '.[$user] // "Unknown"'
          }
          
          # 작성자의 Slack ID 가져오기
          if [ -z "$PR_AUTHOR" ]; then
            SLACK_AUTHOR_ID="작성자 정보 없음"
          else
            SLACK_AUTHOR_ID=$(get_slack_id "$PR_AUTHOR")
          fi
          
          # 모든 리뷰어 멘션 생성 함수
          get_all_reviewers_mentions() {
            local CURRENT_REVIEWERS='${{ toJson(github.event.pull_request.requested_reviewers) }}'
            local REVIEWER_MENTIONS=""
          
            if [ "$CURRENT_REVIEWERS" != "null" ] && [ "$CURRENT_REVIEWERS" != "[]" ] && [ -n "$CURRENT_REVIEWERS" ]; then
              for reviewer in $(echo "$CURRENT_REVIEWERS" | jq -r '.[].login'); do
                SLACK_ID=$(get_slack_id "$reviewer")
                if [ "$SLACK_ID" != "Unknown" ]; then
                  REVIEWER_MENTIONS+="<@$SLACK_ID> "
                else
                  REVIEWER_MENTIONS+="@$reviewer (GitHub) "
                fi
              done
            fi
          
            echo "$REVIEWER_MENTIONS"
          }
          
          echo "Processing PR #${PR_NUMBER} - Action: ${PR_ACTION}"
          
          # PR 상태에 따른 메시지 구분
          case "$PR_ACTION" in
            "ready_for_review")
              # 현재 할당된 리뷰어가 있는지 확인
              CURRENT_REVIEWERS='${{ toJson(github.event.pull_request.requested_reviewers) }}'
          
              # 리뷰어가 null이거나 빈 배열이면 메시지 전송하지 않음
              if [ "$CURRENT_REVIEWERS" == "null" ] || [ "$CURRENT_REVIEWERS" == "[]" ] || [ -z "$CURRENT_REVIEWERS" ]; then
                echo "No reviewers assigned. Skipping notification."
                exit 0
              fi
          
              echo "Reviewers assigned, sending review request notification"
              PR_STATUS="📢 *리뷰 알림 요청*"
              ALL_MENTIONS=$(get_all_reviewers_mentions)
          
              # 리뷰어가 실제로 있을 때만 진행
              if [ -z "$ALL_MENTIONS" ]; then
                echo "No valid reviewers found. Skipping notification."
                exit 0
              fi
              ;;
          
            "review_requested")
              # 요청된 리뷰어가 null이면 메시지 전송하지 않음
              REQUESTED_REVIEWER="${{ github.event.requested_reviewer.login }}"
              if [ -z "$REQUESTED_REVIEWER" ] || [ "$REQUESTED_REVIEWER" == "null" ]; then
                echo "No specific reviewer requested. Skipping notification."
                exit 0
              fi
          
              PR_STATUS="📢 *리뷰 알림 요청*"
          
              SLACK_REVIEWER_ID=$(get_slack_id "$REQUESTED_REVIEWER")
              if [ "$SLACK_REVIEWER_ID" != "Unknown" ]; then
                ALL_MENTIONS="<@$SLACK_REVIEWER_ID>"
              else
                ALL_MENTIONS="@$REQUESTED_REVIEWER (GitHub)"
              fi
              ;;
          
            "closed")
              # PR 작성자 멘션
              if [ "$SLACK_AUTHOR_ID" != "Unknown" ] && [ "$SLACK_AUTHOR_ID" != "작성자 정보 없음" ]; then
                AUTHOR_MENTION="<@$SLACK_AUTHOR_ID>"
              else
                AUTHOR_MENTION="@$PR_AUTHOR (GitHub)"
              fi
          
              if [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
                PR_STATUS="✅ *PR Merged*"
              else
                PR_STATUS="❌ *PR Closed*"
              fi
              ALL_MENTIONS="$AUTHOR_MENTION"
              ;;
          
            "reopened")
              PR_STATUS="♻️ *PR이 다시 열렸습니다!*"
              # 리뷰어들 멘션
              ALL_MENTIONS=$(get_all_reviewers_mentions)
              ;;
          
            *)
              PR_STATUS="☝️ *PR 업데이트 알림*"
              # 리뷰어들 멘션
              ALL_MENTIONS=$(get_all_reviewers_mentions)
              ;;
          esac
          
          # Slack 작성자 표시
          if [ "$SLACK_AUTHOR_ID" == "Unknown" ] || [ "$SLACK_AUTHOR_ID" == "작성자 정보 없음" ]; then
            AUTHOR_DISPLAY="@$PR_AUTHOR (GitHub)"
          else
            AUTHOR_DISPLAY="<@$SLACK_AUTHOR_ID>"
          fi
          
          # 메시지 구성
          MESSAGE_TEXT="${PR_STATUS}\\n*PR 제목:* ${PR_TITLE} (#${PR_NUMBER})\\n*작성자:* ${AUTHOR_DISPLAY}"
          
          # 멘션 대상에 따라 라벨 구분
          if [ -n "$ALL_MENTIONS" ]; then
            case "$PR_ACTION" in
              "closed")
                # closed/merged 일 때는 작성자 멘션이므로 별도 표시 안 함 (이미 작성자로 표시됨)
                ;;
              *)
                # 나머지는 리뷰어 멘션
                MESSAGE_TEXT="${MESSAGE_TEXT}\\n*리뷰어:* ${ALL_MENTIONS}"
                ;;
            esac
          fi
          
          MESSAGE_TEXT="${MESSAGE_TEXT}\\n*링크:* ${PR_URL}"
          
          echo "Sending Slack notification: ${PR_STATUS}"
          
          # Slack Webhook 호출
          curl -X POST \
               -H 'Content-type: application/json' \
               --data "{
                 \"text\": \"${MESSAGE_TEXT}\"
               }" \
               ${{ secrets.SLACK_WEBHOOK_URL }}