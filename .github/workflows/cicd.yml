name: CI/CD

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ develop ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !github.event.pull_request)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Copy compose and nginx files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,docker-compose.infra.yml,nginx/nginx.conf,nginx/proxy_headers.conf,monitoring/prometheus.yml"
          target: "~/"
          overwrite: true

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Parameter Store에서 .env 생성
            aws ssm get-parameters-by-path \
              --path "/sportsify/backend/" \
              --with-decryption \
              --region ${{ secrets.AWS_REGION }} \
              --query "Parameters[*].[Name,Value]" \
              --output text | \
              awk '{split($1,a,"/"); print a[4] "=" $2}' > ~/.env

            # 공유 네트워크 생성 (없으면 생성, 있으면 무시)
            docker network create sportsify-net 2>/dev/null || true

            # 인프라 기동
            if ! docker compose -f ~/docker-compose.infra.yml --env-file ~/.env up -d; then
              echo "인프라 기동 실패"
              docker compose -f ~/docker-compose.infra.yml --env-file ~/.env down
              exit 1
            fi

            # postgres healthy 대기 (최대 90초)
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' sportsify-postgres 2>/dev/null)
              if [ "$STATUS" = "healthy" ]; then
                break
              fi
              sleep 5
            done

            if [ "$STATUS" != "healthy" ]; then
              echo "postgres 기동 실패"
              exit 1
            fi

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            export IMAGE_NAME=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}
            export IMAGE_TAG=${{ github.sha }}

            docker pull $IMAGE_NAME:$IMAGE_TAG

            # active 포인터 파일이 없으면 기본값(was-blue)으로 생성 (초기 배포)
            if [ ! -f ~/nginx/active-upstream.conf ]; then
              printf 'upstream sportsify-active {\n    server was-blue:8080 max_fails=3 fail_timeout=30s;\n}\n' > ~/nginx/active-upstream.conf
            fi

            # active 포인터에서 현재 라우팅 대상 확인 (nginx가 실제 트래픽 보내는 컨테이너)
            ACTIVE_SERVER=$(grep server ~/nginx/active-upstream.conf | awk '{print $2}')

            if echo "$ACTIVE_SERVER" | grep -q "was-blue"; then
              ACTIVE=blue
              NEXT=green
            else
              ACTIVE=green
              NEXT=blue
            fi

            # next 컨테이너 교체 기동
            IMAGE_NAME=$IMAGE_NAME IMAGE_TAG=$IMAGE_TAG \
              docker compose -f ~/docker-compose.prod.yml up -d --no-deps was-$NEXT

            # 헬스체크 대기 (최대 90초)
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' sportsify-was-$NEXT 2>/dev/null)
              if [ "$STATUS" = "healthy" ]; then
                break
              fi
              sleep 5
            done

            if [ "$STATUS" != "healthy" ]; then
              echo "Health check failed. Rolling back."
              docker compose -f ~/docker-compose.prod.yml stop was-$NEXT
              exit 1
            fi

            # active 포인터 전환 (nginx.conf는 include로 이 파일을 참조)
            sed -i "s|was-$ACTIVE:8080|was-$NEXT:8080|" ~/nginx/active-upstream.conf

            # nginx 적용 (떠있으면 검증 후 reload, 없으면 기동)
            if docker ps --format '{{.Names}}' | grep -q sportsify-nginx; then
              APPLY="docker exec sportsify-nginx nginx -t && docker exec sportsify-nginx nginx -s reload"
            else
              APPLY="IMAGE_NAME=$IMAGE_NAME IMAGE_TAG=$IMAGE_TAG docker compose -f ~/docker-compose.prod.yml up -d nginx"
            fi

            # 실패 시 active 포인터 복구 + 새 컨테이너 종료 후 배포 취소 (이전 컨테이너 유지)
            if ! eval "$APPLY"; then
              echo "nginx 적용 실패. 롤백."
              sed -i "s|was-$NEXT:8080|was-$ACTIVE:8080|" ~/nginx/active-upstream.conf
              docker compose -f ~/docker-compose.prod.yml stop was-$NEXT
              exit 1
            fi

            # 이전 컨테이너 중단
            docker compose -f ~/docker-compose.prod.yml stop was-$ACTIVE
