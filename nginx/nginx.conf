events {}

http {
    upstream sportsify-blue {
        server was-blue:8080;
    }

    upstream sportsify-green {
        server was-green:8080;
    }

    # Blue/Green 전환 시 이 줄만 변경 후 nginx reload
    upstream sportsify-active {
        server was-blue:8080;
    }

    server {
        listen 80;
        server_name api.jhkoder.shop;

        location /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name api.jhkoder.shop;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (채팅)
        location /ws/ {
            proxy_pass http://sportsify-active;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # REST API
        location / {
            proxy_pass http://sportsify-active;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            client_max_body_size  1M;
        }
    }

    # IP 직접 접근 및 잘못된 도메인 차단
    server {
        listen 80  default_server;
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        return 444;
    }
}
