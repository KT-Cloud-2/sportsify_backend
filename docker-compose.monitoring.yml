# 로컬 모니터링 (선택적): Prometheus + Grafana
# 평소에는 끄고, 성능 분석 필요 시에만 기동
# 실행: docker compose -f docker-compose.monitoring.yml up -d
# 종료: docker compose -f docker-compose.monitoring.yml down

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: sportsify-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=3d"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    container_name: sportsify-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_INSTALL_PLUGINS: redis-datasource
      REDIS_GRAFANA_URL: redis://host.docker.internal:6379
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

volumes:
  prometheus_data:
  grafana_data:
