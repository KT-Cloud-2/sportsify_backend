spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:sportsify}
    username: ${DB_USERNAME:sportsify}
    password: ${DB_PASSWORD:sportsify}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      # password 없음 (로컬)

  # OAuth2 — 로컬 개발 시 더미값 사용 (실제 키는 .env.local에서 주입)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:local-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:local-google-client-secret}
            scope: email, profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID:local-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:local-kakao-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile_nickname, account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-chars}
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 1209600000

app:
  oauth2:
    redirect-uri: http://localhost:8080/oauth2/callback

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    enabled: true

# MQTT — 구현 시 활성화
#mqtt:
#  broker:
#    url: tcp://localhost:1883
#  client:
#    id: sportsify-local
#  username: local
#  password: local

logging:
  level:
    com.sportsify: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
