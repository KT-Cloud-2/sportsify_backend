spring:
  application:
    name: sportsify
  datasource:
    hikari:
      connection-timeout: 5000

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  task:
    scheduling:
      shutdown:
        await-termination: true
        await-termination-period: 10s

  jackson:
    time-zone: UTC
    datatype:
      datetime:
        write-dates-as-timestamps: false

mqtt:
  broker-url: tcp://localhost:1883
  client-id: ${MQTT_CLIENT_ID:notification-service}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

toss:
  payments:
    secret-key: ${TOSS_PAYMENTS_SECRET_KEY:test-payment-secret}
    confirm-url: https://api.tosspayments.com/v1/payments/confirm
    cancel-url: https://api.tosspayments.com/v1/payments/{paymentKey}/cancel

notification:
  pel:
    claim-min-idle: 10m
    batch-size: 100
    stuck-timeout: 10m
    backoff-minutes: 1,3,5,10
    max-stuck-retry: 3
  stream:
    max-len: 10000
  scheduler:
    stream-trim-cron: "0 0 3 * * *"
    stuck-recovery-cron: "0 0/10 * * * *"
    pel-reclaim-cron: "0 0/1 * * * *"
    reserved-dispatch-cron: "0 0/5 * * * *"
    leader-lock-ttl: 310s
  channel:
    max-per-member: 2
  fanout:
    chunk-size: 500
  payload:
    game-start-offset-minutes: 30
  sse:
    timeout-ms: 1800000
  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}
    signing-secret: ${SLACK_SIGNING_SECRET:}
    suppress-ttl: 10m

springdoc:
  api-docs:
    path: /v3/api-docs
    version: OPENAPI_3_0
  swagger-ui:
    enabled: true
    path: /swagger
  default-produces-media-type: application/json
