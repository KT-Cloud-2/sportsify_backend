spring:
  application:
    name: sportsify

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jackson:
    time-zone: UTC
    datatype:
      datetime:
        write-dates-as-timestamps: false

mqtt:
  broker-url: tcp://localhost:1883
  client-id: ${MQTT_CLIENT_ID:notification-service}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

toss:
  payments:
    secret-key: ${TOSS_PAYMENTS_SECRET_KEY:test-payment-secret}
    confirm-url: https://api.tosspayments.com/v1/payments/confirm
    cancel-url: https://api.tosspayments.com/v1/payments/{paymentKey}/cancel

springdoc:
  api-docs:
    path: /v3/api-docs
springdoc:
  api-docs:
    path: /v3/api-docs
    version: OPENAPI_3_0
  swagger-ui:
    enabled: true
    path: /swagger
  default-produces-media-type: application/json
