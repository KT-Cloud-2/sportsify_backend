<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 테스트</title>
</head>
<body>
<h1>토스 결제 테스트</h1>


<div>
    <label>JWT Token: <input id="tokenInput" placeholder="eyJhbGciOiJ..." style="width:400px" type="text"/></label>
</div>
<div>
    <label>orderId: <input id="orderIdInput" placeholder="ORDER_1_xxxx" type="text"/></label>
</div>
<br>
<div>
    <label>amount: <input id="amountInput" placeholder="50000" type="number"/></label>
</div>

<button onclick="requestPayment()">결제하기</button>

<script src="https://js.tosspayments.com/v1/payment"></script>
<script>
    const clientKey = "test_ck_DnyRpQWGrN6YKg5K0xAlrKwv1M9E";
    const tossPayments = TossPayments(clientKey);

    const origin = window.location.origin;

    function isInvalidAmount(rawAmount, amount) {
        return rawAmount === null
                || rawAmount.trim() === ""
                || Number.isNaN(amount)
                || amount <= 0;
    }

    function requestPayment() {
        const token = document.getElementById("tokenInput").value.trim();
        const orderId = document.getElementById("orderIdInput").value.trim();
        const rawAmount = document.getElementById("amountInput").value.trim();
        const amount = Number(rawAmount);

        if (!token) {
            alert("JWT 토큰을 입력해주세요.");
            return;
        }

        if (!orderId || isInvalidAmount(rawAmount, amount)) {
            alert("orderId 또는 amount가 없거나 올바르지 않습니다.");
            return;
        }

        localStorage.setItem("accessToken", token);

        tossPayments.requestPayment("카드", {
            amount: amount,
            orderId: orderId,
            orderName: "스포츠 경기 예매",
            customerName: "테스트유저",
            successUrl: `${origin}/success.html`,
            failUrl: `${origin}/fail.html`
        });
    }
</script>
</body>
</html>
