<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 테스트</title>
</head>
<body>
<h1>토스 결제 테스트</h1>

<p>orderId: <span id="orderId"></span></p>
<p>amount: <span id="amount"></span></p>

<button onclick="requestPayment()">결제하기</button>

<script src="https://js.tosspayments.com/v1/payment"></script>
<script>
    const clientKey = "test_ck_0RnYX2w5322llqkbJgRK3NeyqApQ";
    const tossPayments = TossPayments(clientKey);

    const params = new URLSearchParams(window.location.search);

    const orderId = params.get("orderId");
    const rawAmount = params.get("amount");
    const amount = Number(rawAmount);
    const origin = window.location.origin;

    document.getElementById("orderId").innerText = orderId;
    document.getElementById("amount").innerText = rawAmount;

    function isInvalidAmount(rawAmount, amount) {
        return rawAmount === null
                || rawAmount.trim() === ""
                || Number.isNaN(amount)
                || amount <= 0;
    }

    function requestPayment() {
        if (!orderId || isInvalidAmount(rawAmount, amount)) {
            alert("orderId 또는 amount가 없거나 올바르지 않습니다.");
            return;
        }

        tossPayments.requestPayment("카드", {
            amount: amount,
            orderId: orderId,
            orderName: "스포츠 경기 예매",
            customerName: "테스트유저",
            successUrl: `${origin}/success.html`,
            failUrl: `${origin}/fail.html`
        });
    }
</script>
</body>
</html>
