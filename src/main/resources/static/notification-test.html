<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Sportsify 알림 테스트</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 24px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #f8fafc;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
        }

        .card h2 {
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #475569;
            flex-shrink: 0;
        }

        .dot.green {
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e88;
        }

        .dot.red {
            background: #ef4444;
            box-shadow: 0 0 6px #ef444488;
        }

        .dot.yellow {
            background: #eab308;
            box-shadow: 0 0 6px #eab30888;
        }

        label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        input, select, textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 13px;
            padding: 8px 12px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #6366f1;
        }

        textarea {
            min-height: 56px;
            resize: vertical;
            font-family: monospace;
            font-size: 11px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #6366f1;
            color: white;
        }

        .btn-primary:hover {
            background: #4f46e5;
        }

        .btn-success {
            background: #16a34a;
            color: white;
        }

        .btn-success:hover {
            background: #15803d;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        .log {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            min-height: 110px;
            max-height: 220px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log .entry {
            margin-bottom: 4px;
            line-height: 1.5;
        }

        .log .ts {
            color: #475569;
        }

        .log .ok {
            color: #22c55e;
        }

        .log .err {
            color: #ef4444;
        }

        .log .inf {
            color: #38bdf8;
        }

        .log .warn {
            color: #eab308;
        }

        .log .sse {
            color: #a78bfa;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-on {
            background: #14532d;
            color: #4ade80;
        }

        .badge-off {
            background: #450a0a;
            color: #f87171;
        }

        .badge-cnt {
            background: #312e81;
            color: #a5b4fc;
        }

        .notif-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
        }

        .notif-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 12px;
        }

        .notif-item.unread {
            border-left: 3px solid #6366f1;
        }

        .notif-item.read {
            opacity: 0.5;
        }

        .notif-meta {
            font-size: 11px;
            color: #475569;
            margin-top: 4px;
        }

        .notif-type {
            font-size: 11px;
            font-weight: 700;
            color: #818cf8;
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1e293b;
        }

        .settings-row:last-child {
            border-bottom: none;
        }

        .toggle {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #334155;
            border-radius: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .slider::before {
            content: '';
            position: absolute;
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }

        input:checked + .slider {
            background: #6366f1;
        }

        input:checked + .slider::before {
            transform: translateX(18px);
        }

        .event-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .event-btn {
            padding: 12px 8px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.15s;
            text-align: center;
        }

        .event-btn:hover {
            border-color: #6366f1;
            background: #1e1b4b;
            color: #a5b4fc;
        }

        .event-btn .icon {
            font-size: 22px;
            display: block;
            margin-bottom: 4px;
        }

        hr {
            border: none;
            border-top: 1px solid #1e293b;
            margin: 14px 0;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .token-status {
            font-size: 12px;
            color: #64748b;
            margin-top: 6px;
        }

        .token-status.ok {
            color: #22c55e;
        }

        .token-status.err {
            color: #ef4444;
        }
    </style>
</head>
<body>

<h1>Sportsify 알림 테스트</h1>
<p class="subtitle">localhost:8080 · 실시간 SSE + Redis Stream 이벤트 발행</p>

<div class="grid">

    <!-- 인증 -->
    <div class="card">
        <h2><span class="dot" id="authDot"></span>인증</h2>
        <label>Member ID</label>
        <input id="memberIdInput" style="margin-bottom:8px" type="number" value="1">
        <div class="btn-row" style="margin-bottom:10px">
            <button class="btn-primary" onclick="fetchToken()">토큰 발급 (서버)</button>
            <button class="btn-secondary" onclick="clearToken()">초기화</button>
        </div>
        <p class="token-status" id="tokenStatus">토큰 없음</p>
        <hr>
        <label>JWT Token (수동 입력도 가능)</label>
        <textarea id="tokenInput" placeholder="eyJ..." rows="2"></textarea>
    </div>

    <!-- SSE -->
    <div class="card">
        <h2><span class="dot" id="sseDot"></span>SSE 실시간 스트림 <span class="badge badge-off" id="sseBadge">미연결</span></h2>
        <div class="btn-row" style="margin-bottom:12px">
            <button class="btn-success" onclick="connectSSE()">연결</button>
            <button class="btn-danger" onclick="disconnectSSE()">끊기</button>
        </div>
        <div class="log" id="sseLog"><span class="inf">SSE 대기 중...</span></div>
    </div>

    <!-- 이벤트 발행 -->
    <div class="card">
        <h2><span class="dot yellow"></span>Redis Stream 이벤트 발행</h2>
        <div class="event-grid">
            <button class="event-btn" onclick="publish('ticket.opened',   {ticketId:1, eventName:'2025 KBO 개막전'})">
                <span class="icon">🎟️</span>티켓 오픈
            </button>
            <button class="event-btn" onclick="publish('payment.completed', {orderId:99, amount:55000, itemName:'VIP석 1매'})">
                <span class="icon">💳</span>결제 완료
            </button>
            <button class="event-btn" onclick="publish('game.starting',   {gameId:7, homeTeam:'LG', awayTeam:'KT', startsIn:'10분'})">
                <span class="icon">⚾</span>경기 시작
            </button>
            <button class="event-btn" onclick="publish('chat.mentioned',  {roomId:3, mentionedBy:'홍길동', preview:'@me 잠깐요!'})">
                <span class="icon">💬</span>채팅 멘션
            </button>
        </div>
        <hr>
        <div class="log" id="pubLog"><span class="inf">이벤트 발행 로그...</span></div>
    </div>

    <!-- 알림 목록 -->
    <div class="card">
        <h2><span class="dot"></span>알림 목록 <span class="badge badge-cnt" id="unreadBadge">0 읽지 않음</span></h2>
        <div class="btn-row" style="margin-bottom:12px">
            <button class="btn-primary btn-sm" onclick="loadNotifications()">새로고침</button>
            <button class="btn-secondary btn-sm" onclick="markAllRead()">모두 읽음</button>
        </div>
        <div class="notif-list" id="notifList">
            <p style="color:#475569;font-size:13px">새로고침을 눌러주세요</p>
        </div>
    </div>

    <!-- 설정 -->
    <div class="card">
        <h2><span class="dot"></span>알림 설정</h2>
        <div id="settingsArea"><p style="color:#475569;font-size:13px">설정 불러오기를 눌러주세요</p></div>
        <div class="btn-row" style="margin-top:14px">
            <button class="btn-primary btn-sm" onclick="loadSettings()">불러오기</button>
            <button class="btn-success btn-sm" onclick="saveSettings()">저장</button>
        </div>
    </div>

    <!-- API 로그 -->
    <div class="card full-width">
        <h2><span class="dot"></span>API 응답 로그</h2>
        <div class="log" id="apiLog"><span class="inf">API 호출 내역...</span></div>
    </div>

</div>

<script>
    let currentToken = '';
    let sseReader = null;
    let settingsCache = {};

    /* ── 유틸 ── */
    function ts() {
        return new Date().toLocaleTimeString('ko-KR');
    }

    function logTo(id, msg, cls = '') {
        const el = document.getElementById(id);
        el.innerHTML += `<div class="entry"><span class="ts">[${ts()}]</span> <span class="${cls}">${escHtml(msg)}</span></div>`;
        el.scrollTop = el.scrollHeight;
    }

    function alog(m, c) {
        logTo('apiLog', m, c);
    }

    function plog(m, c) {
        logTo('pubLog', m, c);
    }

    function slog(m, c) {
        logTo('sseLog', m, c);
    }

    function escHtml(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    /* ── 토큰 ── */
    async function fetchToken() {
        const memberId = document.getElementById('memberIdInput').value || 1;
        try {
            const res = await fetch(`/dev/token?memberId=${memberId}`);
            if (!res.ok) {
                throw new Error(`HTTP ${res.status}`);
            }
            const data = await res.json();
            currentToken = data.token;
            document.getElementById('tokenInput').value = currentToken;
            document.getElementById('tokenStatus').textContent = `토큰 발급 완료 (memberId=${data.memberId})`;
            document.getElementById('tokenStatus').className = 'token-status ok';
            document.getElementById('authDot').className = 'dot green';
            alog(`토큰 발급 완료 — memberId=${data.memberId}`, 'ok');
        } catch (e) {
            document.getElementById('tokenStatus').textContent = `발급 실패: ${e.message}`;
            document.getElementById('tokenStatus').className = 'token-status err';
            alog(`토큰 발급 실패: ${e.message}`, 'err');
        }
    }

    function clearToken() {
        currentToken = '';
        document.getElementById('tokenInput').value = '';
        document.getElementById('tokenStatus').textContent = '토큰 없음';
        document.getElementById('tokenStatus').className = 'token-status';
        document.getElementById('authDot').className = 'dot';
        alog('토큰 초기화', 'warn');
    }

    function getToken() {
        const manual = document.getElementById('tokenInput').value.trim();
        return manual || currentToken;
    }

    /* ── API fetch ── */
    async function api(method, path, body) {
        const token = getToken();
        if (!token) {
            alog('토큰이 없습니다. 먼저 "토큰 발급"을 누르세요.', 'err');
            return null;
        }
        const opts = {method, headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'}};
        if (body !== undefined) {
            opts.body = JSON.stringify(body);
        }
        try {
            const res = await fetch(path, opts);
            const text = await res.text();
            let parsed;
            try {
                parsed = JSON.parse(text);
            } catch {
                parsed = text;
            }
            alog(`${method} ${path} → ${res.status}`, res.ok ? 'ok' : 'err');
            if (parsed && typeof parsed === 'object') {
                alog(JSON.stringify(parsed, null, 2));
            } else if (text) {
                alog(text);
            }
            return {ok: res.ok, status: res.status, data: parsed};
        } catch (e) {
            alog(`${method} ${path} → ${e.message}`, 'err');
            return null;
        }
    }

    /* ── SSE ── */
    async function connectSSE() {
        const token = getToken();
        if (!token) {
            slog('토큰이 없습니다.', 'err');
            return;
        }

        if (sseReader) {
            try {
                await sseReader.cancel();
            } catch {
            }
            sseReader = null;
        }

        slog('SSE 연결 중...', 'inf');

        try {
            const res = await fetch('/api/notifications/stream', {
                headers: {'Authorization': `Bearer ${token}`, 'Accept': 'text/event-stream'}
            });

            if (!res.ok) {
                slog(`연결 실패: HTTP ${res.status}`, 'err');
                return;
            }

            slog('SSE 연결 성공!', 'ok');
            setSseBadge(true);

            sseReader = res.body.getReader();
            const dec = new TextDecoder();

            (async () => {
                try {
                    while (true) {
                        const {done, value} = await sseReader.read();
                        if (done) {
                            break;
                        }
                        dec.decode(value).split('\n').forEach(line => {
                            if (line.startsWith('data:')) {
                                const d = line.slice(5).trim();
                                slog(`수신: ${d}`, 'sse');
                                if (d && d !== 'ping') {
                                    setTimeout(loadNotifications, 600);
                                }
                            }
                        });
                    }
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        slog(`스트림 오류: ${e.message}`, 'err');
                    }
                }
                setSseBadge(false);
            })();

        } catch (e) {
            slog(`연결 오류: ${e.message}`, 'err');
            setSseBadge(false);
        }
    }

    async function disconnectSSE() {
        if (sseReader) {
            try {
                await sseReader.cancel();
            } catch {
            }
            sseReader = null;
        }
        setSseBadge(false);
        slog('연결 끊김', 'warn');
    }

    function setSseBadge(on) {
        const badge = document.getElementById('sseBadge');
        const dot = document.getElementById('sseDot');
        badge.textContent = on ? '연결됨' : '미연결';
        badge.className = on ? 'badge badge-on' : 'badge badge-off';
        dot.className = on ? 'dot green' : 'dot red';
    }

    /* ── 이벤트 발행 ── */
    async function publish(stream, payload) {
        plog(`발행: ${stream}`, 'inf');
        const res = await fetch('/dev/events/publish', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({stream, payload: JSON.stringify(payload)})
        });
        if (res.ok) {
            plog(`완료: ${stream}`, 'ok');
        } else {
            plog(`실패: HTTP ${res.status}`, 'err');
        }
    }

    /* ── 알림 목록 ── */
    async function loadNotifications() {
        const res = await api('GET', '/api/notifications?page=0&size=20');
        if (!res?.ok) {
            return;
        }
        const items = res.data.content || [];
        const unread = items.filter(n => !n.read).length;

        document.getElementById('unreadBadge').textContent = `${unread} 읽지 않음`;

        const el = document.getElementById('notifList');
        if (!items.length) {
            el.innerHTML = '<p style="color:#475569;font-size:13px">알림 없음</p>';
            return;
        }

        el.innerHTML = items.map(n => `
    <div class="notif-item ${n.read ? 'read' : 'unread'}">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:8px">
        <div style="flex:1;min-width:0">
          <span class="notif-type">${n.eventType || '알림'}</span>
          <p style="font-size:12px;margin-top:4px;word-break:break-all">${escHtml(n.payload || '')}</p>
          <p class="notif-meta">${new Date(n.createdAt).toLocaleString('ko-KR')}</p>
        </div>
        ${!n.read ? `<button class="btn-secondary btn-sm" style="flex-shrink:0" onclick="markRead(${n.id})">읽음</button>` : ''}
      </div>
    </div>`).join('');
    }

    async function markRead(id) {
        await api('PATCH', `/api/notifications/${id}/read`);
        await loadNotifications();
    }

    async function markAllRead() {
        await api('PATCH', '/api/notifications/read-all');
        await loadNotifications();
    }

    /* ── 설정 ── */
    async function loadSettings() {
        const res = await api('GET', '/api/notifications/settings');
        if (!res?.ok) {
            return;
        }
        settingsCache = res.data;
        renderSettings(res.data);
    }

    function renderSettings(data) {
        const items = [
            {key: 'ticketOpenAlert', label: '🎟️ 티켓 오픈 알림'},
            {key: 'gameStartAlert', label: '⚾ 경기 시작 알림'},
            {key: 'paymentAlert', label: '💳 결제 알림'},
            {key: 'chatMentionAlert', label: '💬 채팅 멘션 알림 (Beta)'},
        ];
        document.getElementById('settingsArea').innerHTML = items.map(({key, label}) => `
    <div class="settings-row">
      <span style="font-size:14px">${label}</span>
      <label class="toggle">
        <input type="checkbox" id="s-${key}" ${data[key] ? 'checked' : ''}>
        <span class="slider"></span>
      </label>
    </div>`).join('');
    }

    async function saveSettings() {
        const body = {
            ticketOpenAlert: document.getElementById('s-ticketOpenAlert')?.checked ?? settingsCache.ticketOpenAlert,
            gameStartAlert: document.getElementById('s-gameStartAlert')?.checked ?? settingsCache.gameStartAlert,
            paymentAlert: document.getElementById('s-paymentAlert')?.checked ?? settingsCache.paymentAlert,
            chatMentionAlert: document.getElementById('s-chatMentionAlert')?.checked ?? settingsCache.chatMentionAlert,
        };
        const res = await api('PUT', '/api/notifications/settings', body);
        if (res?.ok) {
            settingsCache = res.data;
            renderSettings(res.data);
            alog('설정 저장 완료', 'ok');
        }
    }

    /* ── 자동 토큰 발급 (페이지 로드 시) ── */
    window.addEventListener('load', fetchToken);
</script>

</body>
</html>
