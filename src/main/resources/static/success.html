<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 성공</title>
</head>
<body>
<h1>결제 성공 페이지</h1>

<p>토스 결제 인증 성공. 백엔드 승인 요청 중...</p>

<h3>현재 URL</h3>
<pre id="url"></pre>

<h3>요청 정보</h3>
<pre id="request"></pre>

<h3>승인 결과</h3>
<pre id="result"></pre>

<script>
    document.getElementById("url").innerText = window.location.href;

    const params = new URLSearchParams(window.location.search);

    const paymentKey = params.get("paymentKey");
    const orderId = params.get("orderId");
    const amount = Number(params.get("amount"));

    const requestBody = {
        paymentKey: paymentKey,
        orderId: orderId,
        amount: amount
    };

    document.getElementById("request").innerText = JSON.stringify(requestBody, null, 2);

    async function confirmPayment() {
        if (!paymentKey || !orderId || !amount) {
            document.getElementById("result").innerText = JSON.stringify({
                message: "paymentKey, orderId, amount 중 누락된 값이 있습니다.",
                guide: "success.html 주소에 ?paymentKey=...&orderId=...&amount=... 가 붙어 있는지 확인하세요."
            }, null, 2);
            return;
        }

        try {
            const response = await fetch("/payments/confirm", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(requestBody)
            });

            const text = await response.text();

            let data;
            try {
                data = JSON.parse(text);
            } catch (e) {
                data = text;
            }

            document.getElementById("result").innerText = JSON.stringify({
                httpStatus: response.status,
                ok: response.ok,
                response: data
            }, null, 2);

        } catch (error) {
            document.getElementById("result").innerText = JSON.stringify({
                message: "백엔드 승인 요청 중 오류 발생",
                error: error.message
            }, null, 2);
        }
    }

    confirmPayment();
</script>
</body>
</html>

    confirmPayment();
</script>
</body>
</html>
