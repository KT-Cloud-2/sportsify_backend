spring:
  # datasource/redisлҠ” TestContainersConfigмқҳ @ServiceConnectionмқҙ лҸҷм ҒмңјлЎң мЈјмһ…

  flyway:
    enabled: true
    locations: classpath:db/migration
    lock-retry-count: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis host/portлҠ” TestContainersConfigмқҳ @ServiceConnectionмқҙ лҸҷм ҒмңјлЎң мЈјмһ…

  # н…ҢмҠӨнҠём—җм„ң OAuth2 мһҗлҸҷм„Өм •мқҙ client л“ұлЎқмқ„ мҡ”кө¬н•ҳм§Җ м•ҠлҸ„лЎқ лҚ”лҜё л“ұлЎқ
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope: email, profile
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile_nickname, account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

jwt:
  secret: test-secret-key-must-be-at-least-32-chars-long
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 1209600000

app:
  oauth2:
    redirect-uri: http://localhost:3000/oauth2/callback

mqtt:
  broker:
    url: tcp://localhost:1883
  client:
    id: sportsify-test
  username: test
  password: test
