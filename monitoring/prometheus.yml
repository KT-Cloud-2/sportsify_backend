global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sortsify-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080   # local (IDE에서 Spring Boot 실행 시)
          # - 10.0.0.x:8090             # prod (EC2-1 내부 IP, management port)
