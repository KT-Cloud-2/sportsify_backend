global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sportsify-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080   # local (IDE에서 Spring Boot 실행 시)

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187
