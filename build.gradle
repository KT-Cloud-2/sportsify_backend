plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.3'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'com.epages.restdocs-api-spec' version '0.19.4'
}

group = 'com'
version = '0.0.1-SNAPSHOT'
description = 'backend'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Web
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-websocket'

    // Security & OAuth2
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'

    // JWT (JJWT)
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // JPA + PostgreSQL + Flyway
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    runtimeOnly 'org.postgresql:postgresql'
    implementation 'org.flywaydb:flyway-database-postgresql'

    // QueryDSL ÔÇö OpenFeign fork (Spring Boot 4 / Spring Data 4 ýžÇýŤÉ)
    implementation 'io.github.openfeign.querydsl:querydsl-jpa:7.1'
    annotationProcessor 'io.github.openfeign.querydsl:querydsl-apt:7.1:jakarta'
    annotationProcessor 'jakarta.persistence:jakarta.persistence-api'
    annotationProcessor 'jakarta.annotation:jakarta.annotation-api'

    // Redis
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'

    // Validation
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // API ŰČŞýäť (Swagger UI) ÔÇö Spring Boot 4 ÝśŞÝÖś Ű▓äýáä
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.3'

    // Email (ýĽîŰŽ╝ ŰĆäŰęöýŁŞ) ÔÇö ŕÁČÝśä ýőť ÝÖťýä▒ÝÖö
    //implementation 'org.springframework.boot:spring-boot-starter-mail'

    // MQTT (ýĽîŰŽ╝ ŰĆäŰęöýŁŞ) ÔÇö ŕÁČÝśä ýőť ÝÖťýä▒ÝÖö
    //implementation 'org.springframework.integration:spring-integration-mqtt'

    // Actuator (Prometheus ýŚ░ŰĆÖ)
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'io.micrometer:micrometer-registry-prometheus'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // Testcontainers ÔÇö testcontainers 2.x ýóîÝĹť
    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
    testImplementation 'org.testcontainers:testcontainers-junit-jupiter'
    testImplementation 'org.testcontainers:testcontainers-postgresql'
    testImplementation 'org.testcontainers:testcontainers-jdbc'
    testImplementation 'org.testcontainers:testcontainers'   // Redis GenericContainerýÜę

    // Spring REST Docs + OpenAPI Ű│ÇÝÖś (restdocs-api-spec)
    testImplementation 'org.springframework.restdocs:spring-restdocs-mockmvc'
    testImplementation 'com.epages:restdocs-api-spec-mockmvc:0.19.4'

}

// QueryDSL QÝü┤Ű×śýŐĄ ýâŁýä▒ ŕ▓ŻŰíť
def querydslDir = layout.buildDirectory.dir('generated/querydsl')

sourceSets {
    main {
        java {
            srcDirs += [querydslDir]
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.generatedSourceOutputDirectory = querydslDir
}

tasks.named('test') {
    useJUnitPlatform()
}

// Spring REST Docs Ôćĺ OpenAPI 3.0 JSON Ű│ÇÝÖś
openapi3 {
    server = 'http://localhost:8080'
    title = 'Sportsify API'
    description = 'ýŐĄÝĆČýŞá ŕ▓ŻŕŞ░ ýśłŰžĄ + ÝîÇ ýŁĹýŤÉ ý▒äÝîů ýäťŰ╣äýŐĄ API'
    version = project.version
    format = 'json'
    outputDirectory = layout.buildDirectory.dir('api-spec').get().asFile.path
    outputFileNamePrefix = 'openapi'
}

// openapi3ŰŐö test ýŐĄŰőłÝÄź ýŁ┤ÝŤäýŚÉ ýőĄÝľë
afterEvaluate {
    tasks.named('openapi3') {
        dependsOn tasks.named('test')
    }
}

// openapi.jsonýŁä Ű╣îŰôť ýé░ýÂťŰČ╝ static ŰööŰáëÝćáŰŽČŰíť Ű│ÁýéČ
// src/main/resources/static ŰŐö ŕ▒┤ŰôťŰŽČýžÇ ýĽŐýŁî ÔÇö jar Űé┤ŰÂÇýŚÉŰžî ÝĆČÝĽĘŰÉĘ
tasks.register('copyOpenApiSpec', Copy) {
    dependsOn 'openapi3'
    from layout.buildDirectory.dir('api-spec')
    include 'openapi.json'
    into layout.buildDirectory.dir('resources/main/static')
}

// processResources ýŁ┤ÝŤä, copyOpenApiSpecýŁ┤ ŰŹ«ýľ┤ýô░ýžÇ ýĽŐŰĆäŰíŁ ýłťýäť Ű│┤ý×ą
tasks.named('copyOpenApiSpec') {
    mustRunAfter 'processResources'
}

// bootJar ýőĄÝľë ýőť: test Ôćĺ openapi3 Ôćĺ copyOpenApiSpec Ôćĺ resolveMainClassName Ôćĺ bootJar
tasks.named('bootJar') {
    dependsOn 'copyOpenApiSpec'
}

// resolveMainClassNameýŁÇ build/resources/mainýŁä ýŁŻýť╝Ű»ÇŰíť copyOpenApiSpec ýŁ┤ÝŤä ýőĄÝľë Ű│┤ý×ą
tasks.named('resolveMainClassName') {
    mustRunAfter 'copyOpenApiSpec'
}
