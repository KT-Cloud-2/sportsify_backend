plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.3'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'com.epages.restdocs-api-spec' version '0.20.1'
}

group = 'com'
version = '0.0.1-SNAPSHOT'
description = 'backend'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
    maven { url 'https://repo.spring.io/libs-release' }
}

dependencies {
    // Web
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-websocket'

    // Security & OAuth2
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'

    // JWT (JJWT)
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // JPA + PostgreSQL + Flyway
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    runtimeOnly 'org.postgresql:postgresql'
    implementation 'org.springframework.boot:spring-boot-starter-flyway'
    implementation 'org.flywaydb:flyway-database-postgresql'

    // QueryDSL — OpenFeign fork (Spring Boot 4 / Spring Data 4 지원)
    implementation 'io.github.openfeign.querydsl:querydsl-jpa:7.1'
    annotationProcessor 'io.github.openfeign.querydsl:querydsl-apt:7.1:jakarta'
    annotationProcessor 'jakarta.persistence:jakarta.persistence-api'
    annotationProcessor 'jakarta.annotation:jakarta.annotation-api'

    // Redis
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'

    // Validation
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // API 문서 (Swagger UI) — Spring Boot 4 호환 버전
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.3'

    // Email (알림 도메인) — 구현 시 활성화
    //implementation 'org.springframework.boot:spring-boot-starter-mail'

    // MQTT (알림 도메인) — 구현 시 활성화
    //implementation 'org.springframework.integration:spring-integration-mqtt'

    // Actuator (Prometheus 연동)
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'io.micrometer:micrometer-registry-prometheus'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // Testcontainers — testcontainers 2.x 좌표
    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
    testImplementation 'org.testcontainers:testcontainers-junit-jupiter'
    testImplementation 'org.testcontainers:testcontainers-postgresql'
    testImplementation 'org.testcontainers:testcontainers-jdbc'
    testImplementation 'org.testcontainers:testcontainers'   // Redis GenericContainer용

    // Spring REST Docs + OpenAPI 변환 (restdocs-api-spec)
    testImplementation 'org.springframework.restdocs:spring-restdocs-mockmvc'
    testImplementation 'com.epages:restdocs-api-spec-mockmvc:0.20.1'

}

// QueryDSL Q클래스 생성 경로
def querydslDir = layout.buildDirectory.dir('generated/querydsl')

sourceSets {
    main {
        java {
            srcDirs += [querydslDir]
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.generatedSourceOutputDirectory = querydslDir
}

tasks.named('test') {
    useJUnitPlatform()
}

// Spring REST Docs → OpenAPI 3.0 JSON 변환
// src/main/resources/static 에 직접 출력 → bootRun/bootJar 모두 추가 설정 없이 /openapi.json 서빙
openapi3 {
    server = 'http://localhost:8080'
    title = 'Sportsify API'
    description = '스포츠 경기 예매 + 팀 응원 채팅 서비스 API'
    version = project.version
    format = 'json'
    outputDirectory = 'src/main/resources/static'
    outputFileNamePrefix = 'openapi'
}

// openapi.json 예시 값을 escaped string → JSON object로 변환 (Redoc pretty-print 지원)
tasks.register('prettifyOpenApiExamples') {
    dependsOn 'openapi3'
    def outputFile = file('src/main/resources/static/openapi.json')
    inputs.file(outputFile)
    outputs.file(outputFile)
    doLast {
        def slurper = new groovy.json.JsonSlurper()
        def spec = slurper.parse(outputFile)

        def fixExamples = { examples ->
            examples.each { key, exampleObj ->
                def val = exampleObj['value']
                if (val instanceof String) {
                    try {
                        exampleObj['value'] = slurper.parseText(val)
                    } catch (ignored) {}
                }
            }
        }

        spec['paths']?.each { path, pathItem ->
            pathItem.each { method, operation ->
                if (operation instanceof Map) {
                    operation['responses']?.each { status, response ->
                        response['content']?.each { mediaType, mediaTypeObj ->
                            if (mediaTypeObj['examples']) fixExamples(mediaTypeObj['examples'])
                        }
                    }
                    operation['requestBody']?.get('content')?.each { mediaType, mediaTypeObj ->
                        if (mediaTypeObj['examples']) fixExamples(mediaTypeObj['examples'])
                    }
                }
            }
        }

        outputFile.text = groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(spec))
    }
}

tasks.named('bootJar') {
    dependsOn 'prettifyOpenApiExamples'
}

tasks.named('processResources') {
    dependsOn 'prettifyOpenApiExamples'
}

afterEvaluate {
    tasks.named('openapi3') {
        finalizedBy 'prettifyOpenApiExamples'
    }
}
